name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yaml"
      - "bin/**"
      - "example/**"
      - "lib/**"
      - "test/**"
      - "analysis_options.yaml"
      - "dart_test.yaml"
      - "pubspec.yaml"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yaml"
      - "bin/**"
      - "example/**"
      - "lib/**"
      - "test/**"
      - "analysis_options.yaml"
      - "dart_test.yaml"
      - "pubspec.yaml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        run: dart pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project
        run: dart analyze --fatal-infos

      - name: Run Zig metadata dumper tests
        run: zig test lib/src/zig_api_dump.zig

      - name: Run math example Zig tests
        run: zig build test
        working-directory: example/math/zig

      - name: Build Zig Dart API example
        run: zig build
        working-directory: example/zig_dart_api/zig

      - name: Run tests
        run: dart test -P ci
